name: Publish

# Publishes to npm on any `v*` tag push via npm Trusted Publishing (OIDC).
# No NPM_TOKEN secret — npm exchanges the GitHub OIDC token for a short-lived
# publish credential. Requires:
#   - `id-token: write` permission (below) so the runner can mint the OIDC token
#   - Trusted Publisher configured on npmjs.com for this package/scope, pointing
#     at Cliftonz/tandoor-recipe-mcp + workflow `publish.yml`
#   - npm CLI >= 11.5.1 (Node 22 ships 10.x, so we upgrade in-job)
# Provenance attestation is emitted automatically alongside the publish.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Guard: fail loudly if the tag doesn't match package.json.
      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
